{% extends "base.html" %}

{% block title %}ShortForge AI{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <div class="text-center mb-12">

        <h1 class="text-6xl font-extrabold mb-6">
            🚀 ShortForge AI
        </h1>

        <p class="text-xl text-gray-300">
            Create AI-powered YouTube Shorts, Instagram Reels and TikTok videos in minutes.
        </p>

    </div>

    <div class="glass rounded-3xl p-10 shadow-2xl">

        <form action="/generate" method="post" class="space-y-6">

            <div>

                <label class="block mb-2 text-lg font-semibold">
                    Video Topic
                </label>

                <textarea
                    name="prompt"
                    rows="5"
                    required
                    placeholder="Example: The History of the Taj Mahal..."
                    class="w-full rounded-xl bg-slate-900 border border-slate-700 p-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>

            </div>

            <div class="grid md:grid-cols-3 gap-6">

                <div>

                    <label class="block mb-2 font-semibold">
                        Style
                    </label>

                    <select
                        name="style"
                        class="w-full rounded-xl bg-slate-900 border border-slate-700 p-3">

                        <option>Storytelling</option>
                        <option>Educational</option>
                        <option>Motivational</option>
                        <option>Funny</option>
                        <option>Documentary</option>

                    </select>

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Duration
                    </label>

                    <select
                        name="duration"
                        class="w-full rounded-xl bg-slate-900 border border-slate-700 p-3">

                        <option>30 seconds</option>
                        <option>45 seconds</option>
                        <option>60 seconds</option>

                    </select>

                </div>

                <div>

                    <label class="block mb-2 font-semibold">
                        Language
                    </label>

                    <select
                        name="language"
                        class="w-full rounded-xl bg-slate-900 border border-slate-700 p-3">

                        <option>English</option>
                        <option>Hindi</option>

                    </select>

                </div>

            </div>

            <button
                type="submit"
                class="w-full gradient text-white text-xl font-bold py-4 rounded-xl hover:scale-105 transition duration-300">

                🚀 Generate Script

            </button>

        </form>

    </div>

</div>

{% endblock %}
