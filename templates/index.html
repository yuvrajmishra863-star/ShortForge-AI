<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ShortForge AI</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🚀 ShortForge AI</h1>

        <p>Create viral YouTube Shorts using AI</p>

        <form action="/generate" method="post">

            <label>Topic</label>

            <input
                id="prompt"
                type="text"
                name="prompt"
                placeholder="e.g. 5 Facts About Space"
                maxlength="500"
                required>

            <p id="counter">Characters: 0 / 500</p>

            <div class="grid">

                <div>

                    <label>Writing Style</label>

                    <select name="style">

                        <option value="educational">🎓 Educational</option>

                        <option value="funny">😂 Funny</option>

                        <option value="storytelling">📖 Storytelling</option>

                        <option value="professional">💼 Professional</option>

                    </select>

                </div>

                <div>

                    <label>Duration</label>

                    <select name="duration">

                        <option>15 sec</option>

                        <option selected>30 sec</option>

                        <option>60 sec</option>

                    </select>

                </div>

                <div>

                    <label>Language</label>

                    <select name="language">

                        <option>English</option>

                        <option>Hindi</option>

                        <option>Hinglish</option>

                    </select>

                </div>

            </div>

            <button id="generateBtn" type="submit">

                ✨ Generate AI Script

            </button>

            <p id="loading" style="display:none">

                🤖 AI is generating your script...

            </p>

        </form>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
