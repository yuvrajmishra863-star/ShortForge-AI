<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Generated Script</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🚀 Generated Script</h1>

        <p><strong>Topic:</strong> {{ prompt }}</p>
        <p><strong>Style:</strong> {{ style }}</p>
        <p><strong>Duration:</strong> {{ duration }}</p>
        <p><strong>Language:</strong> {{ language }}</p>

        <hr>

        <h3>Generated Script</h3>

        <pre id="script">{{ script }}</pre>

        <br>

        <button id="copyBtn">
            📋 Copy Script
        </button>

        <span id="copied"></span>

        <br><br>

        <form action="/voice" method="post">

            <textarea
                name="script"
                style="display:none;">{{ script }}</textarea>

            <button type="submit">
                🎙 Generate Voice
            </button>

        </form>

        <br>

        <a href="/">⬅ Generate Another</a>

    </div>

</div>

<script>

const copyBtn = document.getElementById("copyBtn");
const script = document.getElementById("script");
const copied = document.getElementById("copied");

copyBtn.addEventListener("click", async () => {

    await navigator.clipboard.writeText(script.innerText);

    copied.innerHTML = " ✅ Copied!";

});

</script>

</body>
</html>
